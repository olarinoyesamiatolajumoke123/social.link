<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Olarinoye Samiat | Social links profile</title>

</head>
<body>
  <main class="flex flex-col items-center justify-center min-h-screen bg-gray-100">
    <div class="border border-gray-300 bg-gray-800 p-8 rounded-2xl w-110 text-center flex-col gap-8">
      <div>
        <img src="assets/images/avatar-jessica.jpeg" alt="avatar"class="rounded-full w-24 h-24 mx-auto mb-4">
      </div>
      <div>
        <b class="name font-medium mt-6 text-white text-xl"> Jessica Randall</b>
      </div>
      <div> 
        <p class="city text-sm font-semibold"> London, United Kingdom</p>
      </div>
      <div> 
        <p class="description text-white">Front-end developer and avid reader.</p>
      </div>
      <div class="flex flex-col gap-3 mt-4">
        <button class="btn bg-gray-700 text-white p-3 rounded-lg"> GitHub</button>
        <button class="btn bg-gray-700 text-white p-3 rounded-lg"> Front-end Mentor</button>
        <button class="btn bg-gray-700 text-white p-2 rounded-lg"> Linkedin</button>
        <button class="btn bg-gray-700 text-white p-2 rounded-lg"> Twitter</button>
        <button class="btn bg-gray-700 text-white p-2 rounded-lg"> Instagram</button>
      </div>
    </div>

    </main>  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Samiat Olarinoye </a>.
  </footer>
</body>
</html>
